<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta & Codex Installer | ByBokaArabic</title>
    <style>
        body {
            background-color: #7b0000; /* خلفية باللون الأحمر */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* تغيير لجعل الصفحة قابلة للتمرير إذا لزم الأمر */
            margin: 0;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #ff0000;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* تنسيق الصورة مع الميلان والحركة */
        .animated-image {
            width: 250px;
            border-radius: 20px;
            margin-bottom: 20px;
            transform: rotate(-5deg); /* ميلان لليسار */
            animation: float 3s ease-in-out infinite; /* حركة فوق وتحت */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
        }

        h2 {
            color: #00d9ff;
            margin-bottom: 25px;
        }

        .features {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
        }

        .features li {
            margin: 10px 0;
            font-size: 18px;
        }

        .features li::after {
            content: " ✦";
            color: #a600ff;
        }

        /* تنسيق الأزرار */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: linear-gradient(45deg, #ff0000, #ff4d4d);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.5);
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 40px 0;
        }
    </style>
</head>
<body>
